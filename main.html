<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .block-heading {
      text-align: center;
      color: #3b99e0;
      margin-bottom: 40px;
    }

    .product {
      padding: 20px 0;
      border-bottom: 1px solid #dee2e6;
    }

    .product h5 {
      color: #3b99e0;
    }

    .summary {
      background-color: #f7fbff;
      padding: 20px;
      border-top: 3px solid #5ea4f3;
    }

    .summary h4 {
      color: #3b99e0;
      margin-bottom: 20px;
    }

    .summary .list-group-item {
      border: none;
      padding: 10px 0;
    }

    .summary button {
      background-color: #3b99e0;
      border: none;
      padding: 10px;
      width: 100%;
      color: white;
      font-weight: 500;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <!-- Block Heading -->
  <div class="block-heading">
    <h2>Shopping Cart</h2>
  </div>

  <div class="row">

    <!-- LEFT SIDE PRODUCTS -->
    <div class="col-lg-8">

      <!-- Product 1 -->
      <div class="product">
        <div class="row align-items-center">
          <div class="col-md-3">
            <img src="https://via.placeholder.com/150" class="img-fluid">
          </div>
          <div class="col-md-5">
            <h5>I am very sorry</h5>
            <p>Display: 5 inches<br>RAM: 4GB<br>Memory: 32GB</p>
          </div>
          <div class="col-md-2">
            <label>Quantity:</label>
            <input type="number" class="form-control" value="0">
          </div>
          <div class="col-md-2">
            <h5>$120</h5>
          </div>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="product">
        <div class="row align-items-center">
          <div class="col-md-3">
            <img src="https://via.placeholder.com/150" class="img-fluid">
          </div>
          <div class="col-md-5">
            <h5>I am very sorry</h5>
            <p>Display: 5 inches<br>RAM: 4GB<br>Memory: 32GB</p>
          </div>
          <div class="col-md-2">
            <label>Quantity:</label>
            <input type="number" class="form-control" value="1">
          </div>
          <div class="col-md-2">
            <h5>$120</h5>
          </div>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="product">
        <div class="row align-items-center">
          <div class="col-md-3">
            <img src="https://via.placeholder.com/150" class="img-fluid">
          </div>
          <div class="col-md-5">
            <h5>I am very sorry</h5>
            <p>Display: 5 inches<br>RAM: 4GB<br>Memory: 32GB</p>
          </div>
          <div class="col-md-2">
            <label>Quantity:</label>
            <input type="number" class="form-control" value="1">
          </div>
          <div class="col-md-2">
            <h5>$120</h5>
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT SIDE SUMMARY -->
    <div class="col-lg-4">
      <div class="summary">
        <h4>Summary</h4>
        <div class="d-flex justify-content-between border-bottom pb-2">
          <span>Subtotal</span>
          <span>$360</span>
        </div>
        <div class="d-flex justify-content-between border-bottom py-2">
          <span>Discount</span>
          <span>$0</span>
        </div>
        <div class="d-flex justify-content-between border-bottom py-2">
          <span>Shipping</span>
          <span>$0</span>
        </div>
        <div class="d-flex justify-content-between pt-2">
          <strong>Total</strong>
          <strong>$360</strong>
        </div>
        <button class="btn mt-4">Checkout</button>
      </div>
    </div>

  </div>
</div>

</body>
</html>
